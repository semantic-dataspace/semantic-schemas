# OO-LD Schema for ManufacturingProcess (PMDCo pattern)
# Ontology: Platform MaterialDigital Core Ontology (PMDCo)
#   https://w3id.org/pmd/co/
#
# PMDCo pattern: Input and Output of Processes
#   https://github.com/materialdigital/core-ontology/tree/main/patterns/input%20and%20output%20of%20processes
#
# Graph pattern:
#
#   ManufacturingProcess  (pmdco:PMD_0000029)
#     rdfs:label ──────────────────────────────────────── name string
#     rdfs:comment ────────────────────────────────────── description string  (optional)
#     has_specified_input ────────────────────────────► Material IRI  [× 0..N]
#     has_specified_output ───────────────────────────► Material IRI  [× 0..N]
#     preceded_by ────────────────────────────────────► ManufacturingProcess IRI  [× 0..N]  (optional)
#     has_process_condition ──────────────────────────► ProcessCondition (pmdco:PMD_0000013)  [× 0..N]  (optional)
#       rdfs:label ──────── parameter name
#       qudt:value ──────── numeric value (xsd:double)
#       qudt:hasUnit ─────── unit string
#
# Design notes:
#   - Non-composite: materials and upstream processes are referenced by IRI, not embedded.
#     They are independent knowledge items with their own schemas.
#   - has_specified_input / has_specified_output follow OBI conventions as specified
#     by the PMDCo "Input and Output of Processes" pattern.
#   - preceded_by (BFO_0000062) is the inverse of precedes (BFO_0000063); it is used
#     here because a process form describes its own context (what came before it).
#   - has_process_condition uses pmdco:PMD_0000016, which is the PMDCo object property
#     connecting a planned process to its conditions/parameters.

"@context":
  rdf: "http://www.w3.org/1999/02/22-rdf-syntax-ns#"
  rdfs: "http://www.w3.org/2000/01/rdf-schema#"
  xsd: "http://www.w3.org/2001/XMLSchema#"
  dcterms: "http://purl.org/dc/terms/"
  conforms_to:
    "@id": "http://purl.org/dc/terms/conformsTo"
    "@type": "@id"
  obo: "http://purl.obolibrary.org/obo/"
  obi:
    "@id": "http://purl.obolibrary.org/obo/OBI_"
    "@prefix": true
  bfo:
    "@id": "http://purl.obolibrary.org/obo/BFO_"
    "@prefix": true
  pmdco: "https://w3id.org/pmd/co/"
  qudt: "http://qudt.org/schema/qudt/"
  # Instance IRI base (deployment-specific); override when serialising to RDF.
  # See docs/schema-format.md § "Instance IRI base"
  "@base": "https://w3id.org/pmd/co/test/shape_manufacturing_step#"
  type: "@type"
  id: "@id"
  label:
    "@id": "rdfs:label"
  description:
    "@id": "rdfs:comment"
  has_specified_input:
    "@id": "obi:0000293"   # OBI_0000293  has_specified_input
    "@type": "@id"
    "@container": "@set"
  has_specified_output:
    "@id": "obi:0000299"   # OBI_0000299  has_specified_output
    "@type": "@id"
    "@container": "@set"
  preceded_by:
    "@id": "bfo:0000062"   # BFO_0000062  preceded_by
    "@type": "@id"
    "@container": "@set"
  has_process_condition:
    "@id": "pmdco:PMD_0000016"   # PMD_0000016  has_process_condition
    "@type": "@id"
    "@container": "@set"
  parameter_label:
    "@id": "rdfs:label"
  parameter_value:
    "@id": "qudt:value"
    "@type": "xsd:double"
  parameter_unit:
    "@id": "qudt:hasUnit"

$schema: "https://json-schema.org/draft/2020-12/schema"
$comment: Schema for a pmdco:ManufacturingProcess (Input and Output of Processes pattern)
x-schema-version: '1.0.0'
x-schema-id: 'https://github.com/semantic-dataspace/semantic-schemas/tree/main/schemas/manufacturing/step/PMDCo/'
title: Manufacturing Process
type: object
required:
  - type
  - id
  - label

properties:

  type:
    title: Type
    type: string
    readOnly: true
    const: "pmdco:PMD_0000029"
    default: "pmdco:PMD_0000029"
    options:
      enum_titles:
        - pmdco:ManufacturingProcess

  id:
    title: ID
    description: Identifier for this process instance; managed by the consumer.
    type: string
    readOnly: true
    default: process

  label:
    title: Process Name
    description: >-
      Human-readable name for this manufacturing process
      (e.g. "Sintering and Annealing batch 1", "Hydrogen Decrepitation").
    type: string

  description:
    title: Description
    description: Optional free-text description of what this process does.
    type: string
    format: textarea

  has_specified_input:
    title: Inputs
    description: >-
      Materials (or other objects) consumed or used by this process.
      Each entry is an IRI referencing an existing knowledge-graph node.
    type: array
    items:
      type: string
      format: uri
    uniqueItems: true
    default: []

  has_specified_output:
    title: Outputs
    description: >-
      Materials (or other objects) produced by this process.
      Each entry is an IRI referencing an existing knowledge-graph node.
    type: array
    items:
      type: string
      format: uri
    uniqueItems: true
    default: []

  preceded_by:
    title: Preceded By
    description: >-
      Processes that directly precede this one in the process chain.
      Each entry is an IRI referencing another ManufacturingProcess node.
    type: array
    items:
      type: string
      format: uri
    uniqueItems: true
    default: []

  has_process_condition:
    title: Process Conditions / Parameters
    description: >-
      Quantitative conditions (temperatures, pressures, energies, …) under
      which this process is carried out, modelled as PMDCo ProcessCondition
      nodes (pmdco:PMD_0000013).
    type: array
    items:
      type: object
      title: Process Condition
      required:
        - type
        - id
        - parameter_label
      properties:
        type:
          title: Type
          type: string
          readOnly: true
          const: "pmdco:PMD_0000013"
          default: "pmdco:PMD_0000013"
          options:
            enum_titles:
              - pmdco:ProcessCondition
        id:
          title: ID
          description: Identifier for this process condition instance; managed by the consumer.
          type: string
          readOnly: true
          default: condition-1
        parameter_label:
          title: Parameter Name
          description: >-
            Human-readable name for this condition
            (e.g. "Sintering Temperature", "Applied Pressure", "Energy Consumption").
          type: string
        parameter_value:
          title: Value
          description: Numeric magnitude of the condition.
          type: number
        parameter_unit:
          title: Unit
          description: >-
            Unit of the value as a string label (e.g. "°C", "MPa", "kWh", "bar").
            Use QUDT unit IRIs when available for interoperability.
          type: string
    default: []
