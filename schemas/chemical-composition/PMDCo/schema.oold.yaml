# OO-LD Schema for Chemical Composition — PMDCo pattern
# Ontology: Platform MaterialDigital Core Ontology (PMDCo)
#   https://w3id.org/pmd/co/
#
# Full graph pattern modelled by this schema:
#
#   ChemicalComposition (PMD_0000551)
#     quality_of ──────────────────────────────────────► Material
#     concretizes ─────────────────────────────────────► ChemicalCompositionSpecification (PMD_0025002)
#       has_member ──────────────────────────────────────► FractionValueSpecification (PMD_0025997)
#         value                                            (numeric fraction value)
#         unit                                             (UO unit IRI)
#         specifies_value_of ──────────────────────────► PortionOfChemicalElement (PMD_0020026 etc.)
#           part_of ────────────────────────────────────► Material (same as quality_of target)
#           has_relational_quality ──────────────────────► MassProportion (PMD_0020102 etc.)
#             relational_quality_of ───────────────────► PortionOfChemicalElement (back-ref)

'@context':
  owl:   'http://www.w3.org/2002/07/owl#'
  rdf:   'http://www.w3.org/1999/02/22-rdf-syntax-ns#'
  xml:   'http://www.w3.org/XML/1998/namespace'
  xsd:   'http://www.w3.org/2001/XMLSchema#'
  rdfs:  'http://www.w3.org/2000/01/rdf-schema#'
  obo:
    '@id':     'http://purl.obolibrary.org/obo/'
    '@prefix': true
  bfo:
    '@id':     'http://purl.obolibrary.org/obo/BFO_'
    '@prefix': true
  ro:
    '@id':     'http://purl.obolibrary.org/obo/RO_'
    '@prefix': true
  obi:
    '@id':     'http://purl.obolibrary.org/obo/OBI_'
    '@prefix': true
  iao:
    '@id':     'http://purl.obolibrary.org/obo/IAO_'
    '@prefix': true
  uo:
    '@id':     'http://purl.obolibrary.org/obo/UO_'
    '@prefix': true
  pmdco: 'https://w3id.org/pmd/co/'
  uqudt: 'https://qudt.org/vocab/unit/'
  # Instance IRI base — deployment-specific; override when serialising to RDF.
  # See docs/schema-format.md § "Instance IRI base"
  '@base': 'https://w3id.org/pmd/co/test/shape_chemical_composition#'
  type: '@type'
  id:   '@id'

  quality_of:
    '@id':   'ro:0000080'   # RO_0000080  quality_of
    '@type': '@id'
  concretizes:
    '@id':   'ro:0000059'   # RO_0000059  concretizes
    '@type': '@id'
  has_member:
    '@id':   'ro:0002351'   # RO_0002351  has_member
    '@type': '@id'
  relational_quality_of:
    '@id':   'pmdco:PMD_0025999'
    '@type': '@id'
  has_relational_quality:
    '@id':   'pmdco:PMD_0025998'
    '@type': '@id'
  specifies_value_of:
    '@id':   'obi:0001927'  # OBI_0001927  is_about / specifies_value_of
    '@type': '@id'
  part_of:
    '@id':   'bfo:0000050'  # BFO_0000050  part_of
    '@type': '@id'
  value:
    '@id':   'obi:0001937'  # OBI_0001937  has_specified_numeric_value
  unit:
    '@id':   'iao:0000039'  # IAO_0000039  has_measurement_unit_label
    '@type': '@id'

$schema: 'https://json-schema.org/draft/2020-12/schema'
$comment: Schema for a pmdco:ChemicalComposition
title: Chemical Composition
type: object
required:
  - type
  - id
  - quality_of
  - concretizes

properties:

  type:
    title: Type
    type: string
    readOnly: true
    enum:
      - pmdco:PMD_0000551
    options:
      enum_titles:
        - pmdco:ChemicalComposition

  id:
    title: ID
    description: Identifier for this chemical composition instance; managed by the consumer.
    type: string
    readOnly: true
    default: chem_comp

  quality_of:
    title: Material
    description: The material this chemical composition describes
    type: string

  concretizes:
    title: Composition Specification
    description: The specification containing the element fractions of this composition
    type: object
    required:
      - type
      - id
      - has_member
    properties:

      type:
        title: Type
        type: string
        readOnly: true
        enum:
          - pmdco:PMD_0025002
        options:
          enum_titles:
            - pmdco:ChemicalCompositionSpecification

      id:
        title: ID
        description: Identifier for this composition specification; managed by the consumer.
        type: string
        readOnly: true
        default: chem_comp_spec

      has_member:
        title: Elements
        description: Chemical elements and their fractions in this composition
        type: array
        minItems: 1
        items:
          type: object
          title: Element Fraction
          required:
            - type
            - id
            - value
            - unit
            - specifies_value_of
          properties:

            type:
              title: Type
              type: string
              readOnly: true
              enum:
                - pmdco:PMD_0025997
              options:
                enum_titles:
                  - pmdco:FractionValueSpecification

            id:
              title: ID
              description: Identifier for this fraction entry; managed by the consumer.
              type: string
              readOnly: true
              default: fraction_1

            value:
              title: Fraction Value
              description: Amount of this element in the composition
              type: number
              minimum: 0
              maximum: 100

            unit:
              title: Unit
              description: Unit of the fraction value
              type: string
              enum:
                - uo:0000163
                - uo:0000164
                - uo:0000165
              default: uo:0000163
              options:
                enum_titles:
                  - mass percentage (%)
                  - volume percentage (%)
                  - molar percentage (%)

            specifies_value_of:
              title: Element Reference
              description: The portion of the chemical element this fraction describes
              type: object
              required:
                - type
                - id
                - part_of
                - has_relational_quality
              properties:

                type:
                  title: Chemical Element
                  description: The chemical element this fraction refers to
                  type: string
                  # Extend this list with additional PMDCo PortionOf* classes as IRIs become
                  # available. See the PMDCo ontology at https://w3id.org/pmd/co/
                  enum:
                    - pmdco:PMD_0020026  # PortionOfIron (Fe)
                    - pmdco:PMD_0020050  # PortionOfSilicon (Si)
                  options:
                    enum_titles:
                      - Iron (Fe)
                      - Silicon (Si)

                id:
                  title: ID
                  description: Identifier for this element reference; managed by the consumer.
                  type: string
                  readOnly: true
                  default: element_ref_1

                part_of:
                  title: Part Of
                  description: >-
                    The material this element portion is part of.
                    Must match the root quality_of value; set by the consumer.
                  type: string
                  readOnly: true
                  $comment: Must match the root quality_of value; set by the consumer.

                has_relational_quality:
                  title: Proportion
                  description: >-
                    The proportion quality associated with this element portion.
                    Type and back-reference are managed by the consumer.
                  type: object
                  required:
                    - type
                    - id
                    - relational_quality_of
                  properties:

                    type:
                      title: Proportion Type
                      type: string
                      readOnly: true
                      enum:
                        - pmdco:PMD_0020101
                        - pmdco:PMD_0020102
                      default: pmdco:PMD_0020102
                      options:
                        enum_titles:
                          - pmdco:Proportion
                          - pmdco:MassProportion

                    id:
                      title: ID
                      description: Identifier for this proportion instance; managed by the consumer.
                      type: string
                      readOnly: true
                      default: proportion_1

                    relational_quality_of:
                      title: Relational Quality Of
                      description: >-
                        Back-reference to the element reference instance.
                        Must match specifies_value_of.id; set by the consumer.
                      type: string
                      readOnly: true
                      $comment: Must match the parent specifies_value_of.id; set by the consumer.
