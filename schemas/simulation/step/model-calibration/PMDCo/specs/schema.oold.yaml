# OO-LD Schema for ConstitutiveModelCalibration (PMDCo / OBI pattern)
# Ontology: Platform MaterialDigital Core Ontology (PMDCo)
#   https://w3id.org/pmd/co/
# Root class: OBI ComputerSimulation (OBI_0000471)
#   http://purl.obolibrary.org/obo/OBI_0000471
#
# This schema EXTENDS simulation/step/base/PMDCo/ via JSON Schema $ref + allOf.
# It inherits:
#   - the root class (obi:ComputerSimulation)
#   - has_specified_input   (material/dataset IRI)
#   - has_specified_output  (material-card / dataset IRI)
#   - preceded_by           (process chain)
#   - has_process_condition (simulation parameters)
#
# It ADDS:
#   - model_type           (constitutive model family enum)
#   - calibrated_parameters (array of named parameter values with units)
#
# Supported constitutive models:
#   Hockett-Sherby: sigma = sigma_sat - (sigma_sat - sigma_0) * exp(-c * eps_p^n)
#   Swift:          sigma = C * (eps_0 + eps_p)^n
#   Voce:           sigma = sigma_sat - (sigma_sat - sigma_0) * exp(-theta * eps_p)
#   Hollomon:       sigma = K * eps_p^n
#   Johnson-Cook:   sigma = (A + B*eps_p^n) * (1 + C*ln(eps_dot*)) * (1 - T*^m)
#
# @context note:
#   JSON Schema $ref does not merge @context blocks.  Until the toolchain
#   supports automatic context merging, this schema re-declares all @context
#   entries required by the base schema.  See the section marked
#   "── Base context (mirrored) ──" below.

"@context":
  # ── Model calibration context ─────────────────────────────────────────────
  rdf: "http://www.w3.org/1999/02/22-rdf-syntax-ns#"
  rdfs: "http://www.w3.org/2000/01/rdf-schema#"
  xsd: "http://www.w3.org/2001/XMLSchema#"
  dcterms: "http://purl.org/dc/terms/"
  conforms_to:
    "@id": "http://purl.org/dc/terms/conformsTo"
    "@type": "@id"
  type: "@type"
  id: "@id"
  label:
    "@id": "rdfs:label"
  description:
    "@id": "rdfs:comment"
  # Calibrated model type: stored as a plain string annotation
  model_type:
    "@id": "http://purl.org/dc/terms/type"
  # Calibrated parameters are embedded value nodes (created by the calibration)
  calibrated_parameters:
    "@id": "http://purl.obolibrary.org/obo/OBI_0000299"   # has_specified_output
    "@container": "@set"
  param_name:
    "@id": "rdfs:label"
  param_value:
    "@id": "http://qudt.org/schema/qudt/value"
    "@type": "http://www.w3.org/2001/XMLSchema#double"
  param_unit:
    "@id": "http://qudt.org/schema/qudt/hasUnit"

  # ── Base context (mirrored from simulation/step/base/PMDCo/specs/schema.oold.yaml) ──
  # Keep in sync with that file.
  obo: "http://purl.obolibrary.org/obo/"
  obi:
    "@id": "http://purl.obolibrary.org/obo/OBI_"
    "@prefix": true
  bfo:
    "@id": "http://purl.obolibrary.org/obo/BFO_"
    "@prefix": true
  pmdco: "https://w3id.org/pmd/co/"
  qudt: "http://qudt.org/schema/qudt/"
  "@base": "https://w3id.org/pmd/co/test/shape_model_calibration#"
  has_specified_input:
    "@id": "obi:0000293"
    "@type": "@id"
    "@container": "@set"
  has_specified_output:
    "@id": "obi:0000299"
    "@type": "@id"
    "@container": "@set"
  preceded_by:
    "@id": "bfo:0000062"
    "@type": "@id"
    "@container": "@set"
  has_process_condition:
    "@id": "pmdco:PMD_0000016"
    "@type": "@id"
    "@container": "@set"
  parameter_label:
    "@id": "rdfs:label"
  parameter_value:
    "@id": "qudt:value"
    "@type": "xsd:double"
  parameter_unit:
    "@id": "qudt:hasUnit"

$schema: "https://json-schema.org/draft/2020-12/schema"
$comment: Schema for a constitutive model calibration, extending simulation/step/base/PMDCo/
x-schema-version: '2.0.0'
x-schema-id: 'https://github.com/semantic-dataspace/semantic-schemas/tree/main/schemas/simulation/step/model-calibration/PMDCo/'
x-schema-dependencies:
  - schema-id: 'https://github.com/semantic-dataspace/semantic-schemas/tree/main/schemas/simulation/step/base/PMDCo/'
    compatible-versions:
      - '2.0.0'
    property: (base schema via allOf)
title: Constitutive Model Calibration
type: object

allOf:
  - $ref: "https://github.com/semantic-dataspace/semantic-schemas/tree/main/schemas/simulation/step/base/PMDCo/"

required:
  - type
  - id
  - label
  - model_type

properties:

  type:
    title: Type
    type: string
    readOnly: true
    const: "obi:0000471"
    default: "obi:0000471"
    options:
      enum_titles:
        - obi:ComputerSimulation

  id:
    title: ID
    description: Identifier for this calibration instance; managed by the consumer.
    type: string
    readOnly: true
    default: model-calibration

  label:
    title: Calibration Name
    description: >-
      Human-readable name for this calibration run
      (e.g. "Hockett-Sherby calibration 316L batch 1").
    type: string

  description:
    title: Description
    description: Optional free-text description.
    type: string
    format: textarea

  model_type:
    title: Constitutive Model
    description: >-
      The constitutive model family fitted in this calibration.
      Determines which parameters appear in calibrated_parameters.
    type: string
    enum:
      - Hockett-Sherby
      - Swift
      - Voce
      - Hollomon
      - Johnson-Cook
    options:
      enum_titles:
        - "Hockett-Sherby  (sigma_sat, sigma_0, c, n)"
        - "Swift  (C, eps_0, n)"
        - "Voce   (sigma_sat, sigma_0, theta)"
        - "Hollomon  (K, n)"
        - "Johnson-Cook  (A, B, n, C, m)"

  has_specified_input:
    title: Input Datasets
    description: >-
      IRIs of datasets consumed by this calibration (typically experimental
      stress-strain curves from tensile tests).
    type: array
    items:
      type: string
      format: uri
    uniqueItems: true
    default: []

  has_specified_output:
    title: Output Datasets
    description: >-
      IRIs of the material card or parameter datasets produced by this
      calibration (these are knowledge-graph nodes, not embedded objects).
    type: array
    items:
      type: string
      format: uri
    uniqueItems: true
    default: []

  preceded_by:
    title: Preceded By
    description: IRIs of steps that directly precede this one.
    type: array
    items:
      type: string
      format: uri
    uniqueItems: true
    default: []

  has_process_condition:
    title: Calibration Settings
    description: >-
      Algorithmic settings for the calibration (e.g. optimiser, strain range,
      number of iterations).
    type: array
    items:
      type: object
      title: Calibration Setting
      required:
        - type
        - id
        - parameter_label
      properties:
        type:
          title: Type
          type: string
          readOnly: true
          const: "pmdco:PMD_0000013"
          default: "pmdco:PMD_0000013"
          options:
            enum_titles:
              - pmdco:ProcessCondition
        id:
          title: ID
          type: string
          readOnly: true
          default: condition-1
        parameter_label:
          title: Setting Name
          type: string
        parameter_value:
          title: Value
          type: number
        parameter_unit:
          title: Unit
          type: string
    default: []

  calibrated_parameters:
    title: Calibrated Parameters
    description: >-
      Numerical values of the model parameters determined by this calibration.
      Each entry carries a name, a numeric value, and an optional unit.
    type: array
    items:
      type: object
      title: Model Parameter
      required:
        - id
        - param_name
        - param_value
      properties:
        id:
          title: ID
          description: Identifier for this parameter node; managed by the consumer.
          type: string
          readOnly: true
          default: param-1
        param_name:
          title: Parameter Name
          description: >-
            Symbol or name of the model parameter
            (e.g. "sigma_sat", "sigma_0", "c", "n").
          type: string
        param_value:
          title: Value
          description: Calibrated numeric value of the parameter.
          type: number
        param_unit:
          title: Unit
          description: >-
            Unit of the parameter value (e.g. "MPa", "1/s", "dimensionless").
          type: string
    default: []
